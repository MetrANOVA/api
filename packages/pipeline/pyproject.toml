[project]
name = "pipeline"
version = "0.1.0"
description = "Pipeline package"
requires-python = ">=3.14"
dependencies = [
	"metranova_core",
]

[dependency-groups]
dev = [
	"pytest>=8.4.0",
]

[project.scripts]
pipeline = "pipeline:main"

[tool.uv.sources]
metranova_core = { workspace = true }


[build-system]
requires = ["hatchling>=1.25.0"]
build-backend = "hatchling.build"
