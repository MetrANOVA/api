[project]
name = "metranova-core"
version = "0.1.0"
description = "Shared core package for MetrANOVA services"
requires-python = ">=3.14"
dependencies = [
    "clickhouse-connect>=0.15.0",
    "fastapi[standard]>=0.128.0",
    "httpx>=0.28.1",
    "pydantic-settings>=2.13.1",
]

[dependency-groups]
dev = [
	"black>=26.3.1",
	"pytest>=8.4.0",
]

[build-system]
requires = ["hatchling>=1.25.0"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/metranova"]

[tool.pytest.ini_options]
testpaths = [
	"tests/metranova",
	"packages/admin_api/tests",
	"packages/pipeline/tests",
]

[tool.black]
line-length = 88
target-version = ["py314"]
include = "\\.pyi?$"
