[project]
name = "metranova_core"
version = "0.1.0"
description = "Shared core package for MetrANOVA services"
readme = "README.md"
requires-python = ">=3.14"
dependencies = []

[dependency-groups]
dev = [
	"pytest>=8.4.0",
]

[tool.uv.workspace]
members = [
	"packages/pipeline",
	"packages/admin_api",
	".",
]

[build-system]
requires = ["hatchling>=1.25.0"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/metranova"]

[tool.pytest.ini_options]
testpaths = [
	"tests/metranova_core",
	"packages/admin_api/tests",
	"packages/pipeline/tests",
]
